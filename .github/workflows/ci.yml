name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  server:
    name: Server – lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: flastal
          POSTGRES_PASSWORD: flastal
          POSTGRES_DB: flastal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://flastal:flastal@localhost:5432/flastal_test
      JWT_SECRET: ci_test_secret_minimum_32_characters_long
      NODE_ENV: test
      # Stripe はモックを使用するためダミー値で可
      STRIPE_SECRET_KEY: sk_test_dummy_for_ci
      STRIPE_WEBHOOK_SECRET: whsec_dummy_for_ci
      # Web Push はモックのためダミー値
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: BDummyVapidPublicKeyForCITestingPurposesOnly1234567890
      VAPID_PRIVATE_KEY: dummyVapidPrivateKeyForCITestingOnly12345678
      VAPID_SUBJECT: mailto:ci@flastal.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database schema
        run: npx prisma db push --skip-generate

      - name: Run tests (verbose)
        run: npm test -- --reporter=verbose

      - name: Run test coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-coverage
          path: server/coverage/
          retention-days: 14

  client:
    name: Client – build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    env:
      NEXT_PUBLIC_API_URL: https://flastal-backend.onrender.com
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: BDummyVapidPublicKeyForCITestingPurposesOnly1234567890

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js app
        run: npm run build
        continue-on-error: true

  e2e:
    name: E2E – Playwright
    runs-on: ubuntu-latest
    needs: client
    defaults:
      run:
        working-directory: client

    env:
      NEXT_PUBLIC_API_URL: https://flastal-backend.onrender.com
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: BDummyVapidPublicKeyForCITestingPurposesOnly1234567890
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Next.js dev server
        run: npm run dev &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run E2E tests
        run: npm run e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7
